<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浙大研究生支教团</title>
  <meta name="description" content="浙江大学研究生支教团，用青春点亮边疆的希望">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="home">

  <nav class="nav" id="nav"></nav>

  <main>
    <!-- Hero -->
    <section class="hero">
      <div class="hero-inner">
        <div class="hero-left">
          <div class="hero-label">浙江大学 · 研究生支教团</div>
          <h1 class="hero-title">用青春点亮<br>边疆的希望</h1>
          <p class="hero-subtitle">
            我们是浙江大学研究生支教团，扎根西部，以知识与热情书写青春故事，
            为边远地区的孩子们搭建通往未来的桥梁。
          </p>
          <div class="hero-actions">
            <a href="#news" class="btn btn-primary">了解最新动态</a>
            <a href="team.html" class="btn btn-outline">认识我们</a>
          </div>
        </div>
        <div class="hero-right">
          <div class="hero-featured" id="heroFeatured">
            <div class="hero-featured-img"></div>
            <div class="hero-featured-label">最新动态</div>
            <div class="hero-featured-title skeleton" style="height:20px;width:80%;margin-bottom:6px"></div>
            <div class="hero-featured-date skeleton" style="height:14px;width:40%"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- News Section -->
    <section class="section" id="news">
      <div class="container">
        <div class="section-header">
          <h2>最新<span>动态</span></h2>
          <a href="#" class="see-all">查看全部 →</a>
        </div>
        <div class="news-grid" id="newsGrid">
          <!-- dynamically loaded -->
        </div>
      </div>
    </section>

    <!-- About Teaser -->
    <section class="section">
      <div class="container">
        <div style="max-width:700px; margin:0 auto; text-align:center">
          <div style="font-size:2.5rem; margin-bottom:16px">🌟</div>
          <h2 style="font-size:clamp(1.6rem,3vw,2.2rem); font-weight:900; margin-bottom:16px; letter-spacing:-.02em">
            关于我们
          </h2>
          <p style="color:var(--ink-2); line-height:1.8; margin-bottom:32px; font-size:1.05rem">
            浙江大学研究生支教团是由浙江大学学生自发组织的公益团队，
            致力于赴西部贫困地区开展教育帮扶工作。
            我们相信，教育是改变命运最有力的工具。
          </p>
          <div style="display:flex; gap:16px; justify-content:center; flex-wrap:wrap">
            <a href="team.html" class="btn-ghost">认识团队成员</a>
            <a href="activities.html" class="btn-ghost">查看品牌活动</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">浙江大学研究生支教团</div>
      <div>© 2025 ZJU Graduate Teaching Support Corps · All rights reserved</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user) {
          window.netlifyIdentity.on('login', function() {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
</body>
</html>

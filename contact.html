<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我们 — 浙大研究生支教团</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body data-page="contact">

  <nav class="nav" id="nav"></nav>

  <main>
    <div class="contact-wrap">
      <!-- Left: Info -->
      <div>
        <h1 class="contact-title">联系我们</h1>
        <p class="contact-subtitle">
          无论您是想了解支教团工作、寻求合作，还是希望提供支持，
          我们都期待与您取得联系。
        </p>

        <div class="contact-items">
          <div class="contact-item">
            <div class="contact-icon">📍</div>
            <div>
              <div class="contact-item-label">地址</div>
              <div class="contact-item-value">浙江省杭州市西湖区浙江大学紫金港校区</div>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon">📧</div>
            <div>
              <div class="contact-item-label">邮箱</div>
              <div class="contact-item-value">
                <a href="mailto:jiaotuan@zju.edu.cn">jiaotuan [at] zju [dot] edu [dot] cn</a>
              </div>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon">💬</div>
            <div>
              <div class="contact-item-label">微信公众号</div>
              <div class="contact-item-value">浙江大学研究生支教团</div>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon">🏫</div>
            <div>
              <div class="contact-item-label">主管单位</div>
              <div class="contact-item-value">浙江大学团委</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Map -->
      <div class="map-wrap">
        <div id="map" style="width:100%;height:100%;"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">浙江大学研究生支教团</div>
      <div>© 2026 浙江大学研究生支教团（新疆阿克苏分团）· All rights reserved</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { zoomControl: true }).setView([30.3145, 120.0828], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);
    L.marker([30.3145, 120.0828]).addTo(map).bindPopup('浙江大学紫金港校区').openPopup();
  </script>
</body>
</html>

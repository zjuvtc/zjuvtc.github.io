<!DOCTYPE html>

  <link rel="stylesheet" href="assets/css/style.css">

<body data-page="contact">

  <nav class="nav" id="nav"></nav>

  <main>
    <div class="contact-wrap">
      <!-- Left: Info -->
      <div>
        <h1 class="contact-title">联系我们</h1>
        <p class="contact-subtitle">
          无论您是想了解支教团工作、寻求合作，还是希望提供支持，
          我们都期待与您取得联系。
        </p>

        <div class="contact-items">
          <div class="contact-item">
            <div class="contact-icon">📍</div>
            <div>
              <div class="contact-item-label">地址</div>
              <div class="contact-item-value">浙江省杭州市西湖区浙江大学紫金港校区</div>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon">📧</div>
            <div>
              <div class="contact-item-label">邮箱</div>
              <div class="contact-item-value">
                <a href="mailto:jiaotuan@zju.edu.cn">jiaotuan [at] zju [dot] edu [dot] cn</a>
              </div>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon">💬</div>
            <div>
              <div class="contact-item-label">微信公众号</div>
              <div class="contact-item-value">浙江大学研究生支教团</div>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon">🏫</div>
            <div>
              <div class="contact-item-label">主管单位</div>
              <div class="contact-item-value">浙江大学团委</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Map -->
      <div class="map-wrap">
        <iframe
          src="https://www.openstreetmap.org/export/embed.html?bbox=120.0678%2C30.3045%2C120.0978%2C30.3245&layer=mapnik&marker=30.3145%2C120.0828"
          loading="lazy"
          title="浙江大学紫金港校区">
        </iframe>
      </div>
